<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4 text-primary">Home Speed Monitor</h2>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title">Ajouter une mesure manuelle</h5>
            <form id="speedForm" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">Download (Mbps)</label>
                    <input type="number" step="0.1" id="dl" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Upload (Mbps)</label>
                    <input type="number" step="0.1" id="ul" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Ping (ms)</label>
                    <input type="number" id="ping" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-success w-100">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Historique des mesures</h5>
            <table class="table table-hover mt-3">
                <thead class="table-light">
                    <tr>
                        <th>Date & Heure</th>
                        <th>Download (Mbps)</th>
                        <th>Upload (Mbps)</th>
                        <th>Ping (ms)</th>
                    </tr>
                </thead>
                <tbody id="recordsTable">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- PARTIE JAVASCRIPT --- //
    
    // 1. Fonction pour récupérer et afficher les données
    async function chargerDonnees() {
        const reponse = await fetch('/api/speedtests');
        const donnees = await reponse.json();
        
        const tbody = document.getElementById('recordsTable');
        tbody.innerHTML = ''; // On vide le tableau avant de le remplir
        
        // On inverse le tableau pour avoir les plus récents en haut
        donnees.reverse().forEach(record => {
            const dateFomatee = new Date(record.timestamp).toLocaleString('fr-FR');
            
            tbody.innerHTML += `
                <tr>
                    <td>${dateFomatee}</td>
                    <td class="text-success fw-bold">${record.downloadSpeedMbps} ↓</td>
                    <td class="text-primary">${record.uploadSpeedMbps} ↑</td>
                    <td>${record.pingMs} ms</td>
                </tr>
            `;
        });
    }

    document.getElementById('speedForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        
        const nouvelleMesure = {
            downloadSpeedMbps: document.getElementById('dl').value,
            uploadSpeedMbps: document.getElementById('ul').value,
            pingMs: document.getElementById('ping').value
        };

        await fetch('/api/speedtests', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(nouvelleMesure)
        });

        document.getElementById('speedForm').reset();
        chargerDonnees();
    });

    chargerDonnees();
</script>

</body>
</html>
